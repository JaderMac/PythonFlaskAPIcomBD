    <h1>Lista de clientes</h1>
      <table class="table">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nome</th>
            <th scope="col">Celular</th>
            <th scope="col">Email</th>
            <th scope="col">Ações</th>
          </tr>
        </thead>
        <tbody>
          {%for cliente in clientes%}  
          <tr>
            <th scope="row">{{cliente.id}}</th>
            <td>{{cliente.nome}}</td>
            <td>{{cliente.celular}}</td>
            <td>{{cliente.email}}</td>
            <td><button id="editarCliente" type="button" class="btn btn-primary">Editar Cliente</button>
            <button id="deletarCliente" type="button" class="btn btn-danger">Deletar Cliente</button></td>          
          </tr>
          {% endfor %}
        </tbody>
      </table>
